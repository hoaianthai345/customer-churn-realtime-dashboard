services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: realtime-bi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: realtime-bi-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    volumes:
      - ./:/opt/project
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_INTERNAL_LISTENER},${KAFKA_EXTERNAL_LISTENER}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: realtime-bi-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      TZ: ${TZ}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  spark:
    build:
      context: .
      dockerfile: infra/spark/Dockerfile
    container_name: realtime-bi-spark
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    command: ["/bin/bash", "-c", "tail -f /dev/null"]

  api:
    build:
      context: .
      dockerfile: infra/fastapi/Dockerfile
    container_name: realtime-bi-api
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      spark:
        condition: service_started
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REPLAY_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    command: ["uvicorn", "apps.api_fastapi.main:app", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: .
      dockerfile: infra/next/Dockerfile
    container_name: realtime-bi-web
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    volumes:
      - ./:/opt/project
      - web_node_modules:/opt/project/apps/web_next/node_modules
      - web_next_cache:/opt/project/apps/web_next/.next
    working_dir: /opt/project/apps/web_next
    command: ["/bin/sh", "-c", "npm install --no-audit --prefer-offline && mkdir -p .next && find .next -mindepth 1 -exec rm -rf {} + && npm run dev -- --hostname 0.0.0.0 --port 3000"]

volumes:
  clickhouse_data:
  web_node_modules:
  web_next_cache:
