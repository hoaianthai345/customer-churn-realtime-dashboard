services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: realtime-bi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: realtime-bi-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    volumes:
      - ./:/opt/project
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_INTERNAL_LISTENER},${KAFKA_EXTERNAL_LISTENER}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: realtime-bi-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      TZ: ${TZ}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d

  spark:
    build:
      context: .
      dockerfile: infra/spark/Dockerfile
    container_name: realtime-bi-spark
    depends_on:
      - kafka
      - clickhouse
    env_file:
      - .env
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    command: ["/bin/bash", "-c", "tail -f /dev/null"]

  superset:
    image: apache/superset:latest
    container_name: realtime-bi-superset
    depends_on:
      - clickhouse
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ENV: production
      TZ: ${TZ}
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./infra/superset:/app/docker
    command: ["/bin/bash", "-c", "/app/docker/superset-init.sh && /usr/bin/run-server.sh"]

volumes:
  clickhouse_data:
  superset_home:
